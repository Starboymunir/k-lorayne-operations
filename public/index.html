      <div class="nav-section-label">Inventory</div>
      <a href="#" class="nav-item" data-page="inventory">

        <span>Replenishment</span>
      </a>
      <a href="#" class="nav-item" data-page="alerts">

      <div class="nav-section-label">Commerce</div>

    <div class="sidebar-footer">
      <button class="refresh-btn" id="refreshBtn" title="Refresh data from Shopify">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Refresh Data</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="globalSearch" placeholder="Search customers, orders, tickets..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="topbar-right">
        <span class="store-name" id="storeName"></span>
        <span class="last-updated" id="lastUpdated"></span>
      </div>
    </header>

    <div class="content" id="content">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading data from Shopify...</p>
      </div>
    </div>
  </main>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Shopify App Bridge (enables embedding inside Shopify admin) -->
  <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
  <script>
    // Initialize App Bridge when loaded inside Shopify admin iframe
    (async function initAppBridge() {
      if (typeof shopify !== 'undefined' && window.self !== window.top) {
        try {
          const cfg = await fetch('/api/app-config').then(r => r.json());
          if (cfg.apiKey) {
            shopify.config = { apiKey: cfg.apiKey, shop: cfg.shop };
            console.log('[app-bridge] Embedded in Shopify admin');
          }
        } catch (e) { console.warn('[app-bridge] Init skipped:', e.message); }
      }
    })();
  </script>

  <script src="/app.js"></script>
</body>
</html>
