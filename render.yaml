services:
  - type: web
    name: k-lorayne-operations
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: SHOPIFY_SHOP
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: k-lorayne-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
